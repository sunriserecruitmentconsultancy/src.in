<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunrise Consultancy | Elite Global Recruitment</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    
    <style>
        :root {
            --accent: #FF7A00;
            --accent-soft: rgba(255, 122, 0, 0.1);
            --dark: #0F172A;
            --slate: #64748B;
            --light-bg: #F8FAFC;
            --white: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.7);
            --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--light-bg);
            color: var(--dark);
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        header {
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            transition: 0.3s ease;
        }

        .nav-container {
            max-width: 1300px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo {
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -1px;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
            font-size: 14px;
            margin-left: 35px;
            transition: 0.3s;
            opacity: 0.7;
        }

        nav a:hover { opacity: 1; color: var(--accent); }

        /* --- HERO SECTION --- */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 140px 5% 80px;
            max-width: 1400px;
            margin: auto;
            gap: 60px;
        }

        .hero-content { flex: 1.2; }

        .badge {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(40px, 6vw, 72px);
            line-height: 1.1;
            margin-bottom: 25px;
        }

        .hero p {
            font-size: 18px;
            color: var(--slate);
            max-width: 550px;
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .cta-group { display: flex; gap: 20px; }

        .btn {
            padding: 18px 36px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .btn-main {
            background: var(--dark);
            color: white;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.2);
        }

        .btn-outline {
            border: 2px solid var(--dark);
            color: var(--dark);
        }
